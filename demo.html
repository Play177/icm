            transition: all 0.3s ease;

// Función auxiliar para barajar un array (Fisher-Yates)
function shuffleArray(arr) {
    for (let i = arr.length - 1; i > 0; i--) {
        const j = Math.floor(Math.random() * (i + 1));
        [arr[i], arr[j]] = [arr[j], arr[i]];
    }
    return arr;
}

    function renderPreflopHand() {
        const originalHand = preflopHands[preflopIndex];
        const palosOriginales = ["♠", "♥", "♦", "♣"];
        const palosNuevos = [...palosOriginales].sort(() => Math.random() - 0.5);
        const mapaPalos = {};
        palosOriginales.forEach((p, i) => mapaPalos[p] = palosNuevos[i]);
        const container = document.getElementById('preflopHand');
        container.innerHTML = '';
        originalHand.cards.forEach(card => {
            const rank = card.slice(0, -1);
            const suitOriginal = card.slice(-1);
            const suitVisual = mapaPalos[suitOriginal];
            let suitClass = '';
            if (suitVisual === '♠') suitClass = 's';
            else if (suitVisual === '♥') suitClass = 'h';
            else if (suitVisual === '♦') suitClass = 'd';
            else if (suitVisual === '♣') suitClass = 'c';
            const div = document.createElement('div');
            div.className = `card-chip ${currentDeckStyle} ${suitClass}`;
            if (currentDeckStyle === 'grinder') {
                div.innerHTML = `<div class="grinder-top-left"><span class="grinder-rank-small">${rank}</span><span class="grinder-suit-small">${suitVisual}</span></div><div class="grinder-rank-large">${rank}</div>`;
            } else {
                div.innerHTML = rank + `<small>${suitVisual}</small>`;
            }
            container.appendChild(div);
        });
        document.getElementById('preflopFeedback').classList.add('hidden');
        document.getElementById('preflopActions').classList.remove('hidden');
        document.getElementById('nextPreflopBtn').classList.add('hidden');
    }

            currentStreak++;
            if (currentStreak > bestStreak) bestStreak = currentStreak;

            currentStreak = 0;

        saveStats();

    }

                    y el modo <strong>DEFENSA</strong>.
                `)}

            </div>

            <button class="start-btn"
                onclick="this.closest('#tutorialModal').remove()"
                style="
                    width:100%;
                    margin-top:18px;
                    background:var(--good);
                    color:#000;
                    font-weight:bold;
                ">
                ✅ ENTENDIDO
            </button>
        </div>
    `;

    document.body.appendChild(modal);
setTimeout(() => toggleTutorialItem('realPoker'), 50);
}

/* Helper para crear items del accordion */
function tutorialItem(id, title, content) {
    return `
        <div style="background:rgba(255,255,255,0.04); border-radius:12px; overflow:hidden;">
            <div onclick="toggleTutorialItem('${id}')"
                style="
                    padding:12px;
                    cursor:pointer;
                    font-weight:bold;
                    display:flex;
                    justify-content:space-between;
                    align-items:center;
                ">
                <span>${title}</span>
                <span id="${id}-icon">+</span>
            </div>

            <div id="${id}-content"
                style="
                    display:none;
                    padding:0 12px 12px 12px;
                    font-size:12px;
                    color:var(--muted);
                    line-height:1.5;
                ">
                ${content}
            </div>
        </div>
    `;
}

/* Toggle accordion: solo uno abierto */
function toggleTutorialItem(id) {
    const allContents = document.querySelectorAll('[id$="-content"]');
    const allIcons = document.querySelectorAll('[id$="-icon"]');

    allContents.forEach(el => {
        if (el.id !== id + "-content") el.style.display = "none";
    });

    allIcons.forEach(el => {
        if (el.id !== id + "-icon") el.textContent = "+";
    });

    const content = document.getElementById(id + "-content");
    const icon = document.getElementById(id + "-icon");

    const isOpen = content.style.display === "block";

    content.style.display = isOpen ? "none" : "block";
    icon.textContent = isOpen ? "+" : "−";
}

    function shareTrainer() {
        const url = window.location.href;
        const message = "🎯 Entrena PLO5 como un profesional. Desafía tu juego y desbloquea barajas premium. ¡Pruébalo!";
        if (navigator.share) {
            navigator.share({
                title: "PLO5 Ultimate Trainer",
                text: message,
                url: url
            }).catch(() => showToast("Compartir cancelado"));
        } else {
            navigator.clipboard.writeText(url + "\n" + message);
            showToast("✅ Enlace copiado al portapapeles. ¡Compártelo con tus amigos!");
        }
    }

    function showStatsModal() {
        const missionsCompleted = [
            playerStats.mission1Complete,
            playerStats.mission2Complete,
            playerStats.mission3Complete,
            playerStats.mission4Complete,
            playerStats.mission5Complete
        ].filter(Boolean).length;
        const accuracy = totalHands > 0 ? ((totalCorrect / totalHands) * 100).toFixed(1) : 0;
        const modal = document.createElement('div');
        modal.id = "statsModal";
        modal.style = `position:fixed; inset:0; background:rgba(0,0,0,0.95); z-index:20005; display:flex; align-items:center; justify-content:center; backdrop-filter:blur(15px);`;
        modal.innerHTML = `
            <div class="settings-card" style="max-width: 360px; text-align:left;">
                <h3 style="color:var(--accent); text-align:center;">📊 ESTADÍSTICAS</h3>
                <div style="margin:15px 0; font-size:13px; line-height:1.6;">
                    <p><strong>🃏 Manos jugadas:</strong> ${totalHands}</p>
                    <p><strong>✅ Aciertos:</strong> ${totalCorrect} / ${totalHands} (${accuracy}%)</p>
                    <p><strong>💰 EV total ganado:</strong> $${totalEVGained.toFixed(2)}</p>
                    <p><strong>🏦 Bankroll máximo:</strong> $${maxBankroll.toFixed(2)}</p>
                    <p><strong>⚡ Mejor racha:</strong> ${bestStreak} aciertos seguidos</p>
                    <p><strong>🏆 Misiones completadas:</strong> ${missionsCompleted}/5</p>
                </div>
                <div style="display:flex; flex-direction:column; gap:10px; margin-top:15px;">
                    <button class="next-btn" onclick="resetProgressConfirm()" style="background:var(--bad); color:white;">⚠️ REINICIAR TODO EL PROGRESO</button>
                    <button class="start-btn" onclick="this.closest('#statsModal').remove()">CERRAR</button>
                </div>
            </div>
        `;
        document.body.appendChild(modal);
    }

    function resetProgressConfirm() {
        if (confirm("⚠️ ¿Seguro que quieres BORRAR todo tu progreso?\nSe perderán misiones, desbloqueos, estadísticas y bankroll. Esta acción no se puede deshacer.")) {
            sessionStorage.clear();
            location.reload();
        }
    }

    function renderAppearance() {
        const isModernUnlocked = playerStats.modernUnlocked;
        const isGrinderUnlocked = playerStats.premiumUnlocked;
        const container = settingsModal.querySelector('.settings-card');
        container.innerHTML = `
            <h3 style="color:var(--accent);">🎨 APARIENCIA</h3>
            <div style="margin:15px 0; display:grid; gap:10px;">
                <button class="deck-option" onclick="setDeckStyle('classic')">🃏 Clásica ${currentDeckStyle === 'classic' ? '✅' : ''}</button>
                <button class="deck-option ${!isModernUnlocked ? 'locked' : ''}" onclick="${isModernUnlocked ? "setDeckStyle('modern')" : "showMissionOneModal()"}">
                    🎨 Moderna ${isModernUnlocked ? '🔓' : '🔐'}
                </button>
                <button class="deck-option ${!isGrinderUnlocked ? 'locked' : ''}" onclick="${isGrinderUnlocked ? "setDeckStyle('grinder')" : "showMissionOneModal()"}">
                    ⚡ Grinder ${isGrinderUnlocked ? '🔓' : '🔐'}
                </button>
            </div>
            <button class="next-btn" onclick="renderProfileMain()" style="width:100%;">⬅️ VOLVER</button>
        `;
    }

    function renderMissions() {
        const goal1 = 1, goal2 = 150, goal3 = 200, goal4 = 300, goal5 = 500;
        const progress1 = Math.min(100, (Math.max(0, currentBankroll - 100) / goal1) * 100);
        const progress2 = Math.min(100, (Math.max(0, currentBankroll - 100) / (goal2 - 100)) * 100);
        const progress3 = Math.min(100, (Math.max(0, currentBankroll - 100) / (goal3 - 100)) * 100);
        const progress4 = Math.min(100, (Math.max(0, currentBankroll - 100) / (goal4 - 100)) * 100);
        const progress5 = Math.min(100, (Math.max(0, currentBankroll - 100) / (goal5 - 100)) * 100);
        const container = settingsModal.querySelector('.settings-card');
        container.innerHTML = `<h3 style="color:var(--accent);">🏆 MISIONES</h3><div style="margin:20px 0; text-align:left; max-height:400px; overflow-y:auto; padding-right:5px;">
            ${renderMissionItem(1, "Grinder Experto", "Gana $1 EV", progress1, playerStats.mission1Complete, "Desbloquea barajas Moderna y Grinder")}
            ${renderMissionItem(2, "Aprendiz de CO", "Llega a $150", progress2, playerStats.mission2Complete, "Desbloquea posición CO en ATAQUE")}
            ${renderMissionItem(3, "Maestro del ATAQUE", "Llega a $200", progress3, playerStats.mission3Complete, "Desbloquea UTG, MP, SB en ATAQUE")}
            ${renderMissionItem(4, "Guardia de Defensa", "Llega a $300", progress4, playerStats.mission4Complete, "Desbloquea modo DEFENSA")}
            ${renderMissionItem(5, "Tiburón Premium", "Llega a $500", progress5, playerStats.mission5Complete, "Acceso a contenido PRO (pago)")}
        </div><button class="next-btn" onclick="renderProfileMain()" style="width:100%;">⬅️ VOLVER</button>`;
    }

    function renderMissionItem(num, title, condition, progress, completed, reward) {
        const status = completed ? '✅ COMPLETADA' : `⚡ Progreso: ${Math.floor(progress)}%`;
        const color = completed ? 'var(--good)' : 'var(--accent)';
        return `<div style="border:1px solid ${color}; border-radius:16px; padding:12px; margin-bottom:15px; background:rgba(0,0,0,0.3);"><p style="font-weight:bold; color:${color};">MISIÓN ${num}: ${title}</p><p style="font-size:11px;">${condition}</p><div class="life-bar-bg" style="margin:8px 0;"><div class="life-bar-fill" style="width:${progress}%; background:${color};"></div></div><p style="font-size:10px; text-align:right;">${status}</p><p style="font-size:10px; margin-top:5px;">🎁 ${reward}</p></div>`;
    }

    function setDeckStyle(style) {
        currentDeckStyle = style;
        sessionStorage.setItem('plo5_deck_style', style);
        renderPreflopHand();
        if (settingsModal.style.display === 'flex' && settingsModal.querySelector('h3')?.innerText === '🎨 APARIENCIA') {
            renderAppearance();
        }
    }

    // --------------------------------------------------------------
    // CAPTCHA
    // --------------------------------------------------------------
    let refineryData = [], selectedBottle = null;
    function initBottleGame() { 
        bottleGameActive = true; 
        pendingCaptcha = false; 
        selectedBottle = null; 
        refineryData = [['color-1','color-2','color-3','color-1'],['color-3','color-1','color-2','color-3'],['color-2','color-3','color-1','color-2'],[]]; 
        renderRefinery(); 
        document.getElementById('puzzleStatus').innerHTML = "🌀 Equilibra los colores...";
        const skipBtn = document.getElementById('skipPuzzleBtn');
        if (skipBtn) {
            skipBtn.onclick = () => { window.open("https://tupagina.com/carta-de-venta", "_blank"); };
        }
    }
    function renderRefinery() { const wrapper=document.getElementById('bottlesWrapper'); wrapper.innerHTML=''; refineryData.forEach((layers,idx)=>{ const bottleDiv=document.createElement('div'); bottleDiv.className='bottle'; if(selectedBottle===idx) bottleDiv.classList.add('selected'); if(layers.length===4 && layers.every(l=>l===layers[0])) bottleDiv.classList.add('bottle-complete'); bottleDiv.onclick=()=>onRefineryClick(idx); layers.forEach(colorClass=>{ const layer=document.createElement('div'); layer.className=`liquid ${colorClass}`; bottleDiv.appendChild(layer); }); wrapper.appendChild(bottleDiv); }); }
    function onRefineryClick(idx) { if(selectedBottle===null){ if(refineryData[idx].length>0){ selectedBottle=idx; renderRefinery(); } } else { const from=selectedBottle, to=idx; if(from!==to){ const fromLayers=refineryData[from], toLayers=refineryData[to]; if(fromLayers.length>0){ const topColor=fromLayers[fromLayers.length-1]; if(toLayers.length===0 || (toLayers[toLayers.length-1]===topColor && toLayers.length<4)){ while(fromLayers.length>0 && fromLayers[fromLayers.length-1]===topColor && toLayers.length<4){ toLayers.push(fromLayers.pop()); } } } } selectedBottle=null; renderRefinery(); checkRefineryWin(); } }
    function checkRefineryWin() { const allComplete=refineryData.every(bottle=>bottle.length===0 || (bottle.length===4 && bottle.every(c=>c===bottle[0]))); if(allComplete){ document.getElementById('puzzleStatus').innerHTML="🎯 ¡REFINADO COMPLETO! SISTEMAS ONLINE"; setTimeout(()=>{ currentFocus=Math.min(100,currentFocus+30); updateUI(); moduleCaptcha.classList.add('hidden'); modulePreflop.classList.remove('hidden'); bottleGameActive=false; pendingCaptcha=false; document.getElementById('puzzleStatus').innerHTML=""; selectedBottle=null; },1200); } }
    function triggerCaptchaBreak() { pendingCaptcha=true; bottleGameActive=true; modulePreflop.classList.add('hidden'); moduleCaptcha.classList.remove('hidden'); initBottleGame(); }

    // --------------------------------------------------------------
    // INICIALIZACIÓN
    // --------------------------------------------------------------
    let avatars = ["https://api.dicebear.com/7.x/bottts/svg?seed=BNB1","https://api.dicebear.com/7.x/bottts/svg?seed=BNB2","https://api.dicebear.com/7.x/bottts/svg?seed=BNB3","https://api.dicebear.com/7.x/bottts/svg?seed=BNB4"];
    let currentAvatarIndex = 0;
    document.getElementById('avatarSelector').onclick = () => { currentAvatarIndex = (currentAvatarIndex + 1) % avatars.length; document.getElementById('avatarImg').src = avatars[currentAvatarIndex]; };
    document.getElementById('playerAvatarSmall').addEventListener('click', openSettingsModal);
    document.getElementById('playerNickDisplay').addEventListener('click', openSettingsModal);

    function startGame() {
        let nick = document.getElementById('userNick').value.trim();
        if (nick === "") nick = "HÉROE";
        document.getElementById('playerNickDisplay').innerHTML = nick.toUpperCase();
        document.getElementById('playerAvatarSmall').src = avatars[currentAvatarIndex];
        currentMode = "attack";
        currentPositionKey = "btn";
        updateCurrentPositionData();
        loadProgress();
        loadStats();
        document.getElementById('moduleLogin').style.display = 'none';
        document.getElementById('mainGame').style.display = 'block';
        const posName = positionData[currentMode].positions[currentPositionKey].name;
        document.getElementById('playerNickDisplay').innerHTML = `${nick.toUpperCase()} (${posName})`;
        initGame();
    }

    function initGame() {
    shuffleArray(preflopHands);   // <-- NUEVO: baraja todas las manos
    preflopIndex = 0; 
    preflopScore = 0; 
    currentBankroll = 100.00; 
    currentFocus = 100; 
    renderPreflopHand(); 
    updateUI(); 
    modulePreflop.classList.remove('hidden'); 
    refreshConsole(); 
    handCounter = 0;
    onboardingDone = sessionStorage.getItem('onboardingDone') === 'true';
}


        // === INICIALIZACIÓN TELEGRAM WEBAPP ===
        const tg = window.Telegram.WebApp;
        if (tg) {
            tg.ready();
            tg.expand();
            tg.disableVerticalSwipes();
        }

        // === BLOQUEAR MENÚ CONTEXTUAL AGRESIVAMENTE ===
        document.addEventListener('contextmenu', (e) => {
            e.preventDefault();
            e.stopPropagation();
            return false;
        }, true);

        // Bloquear en imágenes específicamente
        document.querySelectorAll('img').forEach(img => {
            img.addEventListener('contextmenu', (e) => {
                e.preventDefault();
                return false;
            });
        });

        // === MANEJAR CLICS EN BOTONES ===
        document.querySelectorAll('[data-url]').forEach(btn => {
            // Prevenir comportamiento por defecto
            btn.addEventListener('contextmenu', (e) => {
                e.preventDefault();
                return false;
            });

            // Manejar el clic
            btn.addEventListener('click', (e) => {
                e.preventDefault();
                const url = btn.getAttribute('data-url');
                
                // Feedback táctil nativo
                if (tg && tg.HapticFeedback) {
                    tg.HapticFeedback.impactOccurred('light');
                }
                
                // Navegar
                if (url.startsWith('http')) {
                    // Enlaces externos: abrir en navegador
                    if (tg) {
                        tg.openLink(url);
                    } else {
                        window.open(url, '_blank');
                    }
                } else {
                    // Páginas internas: navegación normal
                    window.location.href = url;
                }
            });
        });
