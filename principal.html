<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Preflop Victory | Leo Poker R®</title>
    <style>
        body {
    user-select: none;          /* Estándar */
    -webkit-user-select: none;  /* Safari/Chrome */
    -moz-user-select: none;     /* Firefox */
    -ms-user-select: none;      /* Edge antiguo */
    -webkit-touch-callout: none; /* Evita menú en iOS al mantener presionado */
}
        :root {
            --bg: #0b0f14;
            --card: rgba(18, 24, 38, 0.85);
            --accent: #F3BA2F;
            --muted: #8aa0b6;
            --glass-border: rgba(243, 186, 47, 0.2);
            --wsp: #25D366;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            background: var(--bg);
            background: radial-gradient(circle at bottom, #164e63 0%, #0b0f14 80%);
            color: #e6eef7;
            font-family: 'Inter', system-ui, sans-serif;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 40px 20px 100px;
        }

        /* PERFIL (Estilo dApp) */
        .perfil-container {
            width: 120px;
            height: 120px;
            margin-bottom: 20px;
            border: 3px solid var(--accent);
            border-radius: 50%;
            overflow: hidden;
            box-shadow: 0 0 20px rgba(243, 186, 47, 0.3);
            animation: flotar 3s ease-in-out infinite;
        }

        .perfil-container img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        @keyframes flotar {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-8px); }
        }

        /* TEXTOS */
        h2 { color: #fff; font-size: 24px; font-weight: 800; margin-bottom: 10px; }
        h2 span { color: var(--accent); }
        .bio-desc { color: var(--muted); font-size: 14px; text-align: center; max-width: 320px; margin-bottom: 30px; }

        /* BOTONES (Copiados de tu dApp) */
        .bio-boton {
    display: block;
    width: 100%;
    max-width: 320px;
    margin-bottom: 15px;
    padding: 14px 24px; /* Proporción más equilibrada */
    border-radius: 4px; /* píldora completa para marketing */
    font-weight: 600; /* Legibilidad profesional */
    font-size: 14px;
    text-align: center;
    text-decoration: none;
    transition: all 0.2s cubic-bezier(0.4, 0, 0.2, 1);
    text-transform: none; 
    letter-spacing: 0.3px;
}
        .btn-basico {
            background: rgba(255, 255, 255, 0.05);
            color: #fff;
            border: 1px solid var(--glass-border);
            backdrop-filter: blur(10px);
        }

        .btn-premium {
            background: var(--accent);
            color: #000;
            border: none;
            box-shadow: 0 0 15px rgba(243, 186, 47, 0.2);
        }

        .btn-wsp {
            background: rgba(37, 211, 102, 0.15);
            color: var(--wsp);
            border: 1px solid var(--wsp);
        }

        .bio-boton:hover {
            transform: scale(1.03);
            filter: brightness(1.1);
        }

        /* FOOTER NAV (Copiado de tu dApp) */
        .footer-nav {
            position: fixed;
            bottom: 0; left: 0; right: 0;
            display: flex;
            justify-content: center;
            gap: 12px;
            background: rgba(11, 15, 20, 0.9);
            padding: 15px;
            backdrop-filter: blur(10px);
            border-top: 2px solid var(--accent);
        }

        .footer-nav button {
            background: #1e293b;
            color: #e2e8f0;
            border: none;
            border-radius: 40px;
            padding: 10px 20px;
            font-size: 12px;
            font-weight: bold;
            cursor: pointer;
        }
    /* Estilo para los botones de contacto en Blanco y Negro */
    .btn-contacto {
        background: rgba(255, 255, 255, 0.05);
        color: #fff;
        border: 1px solid rgba(255, 255, 255, 0.2);
        backdrop-filter: blur(10px);
    }

    .btn-contacto:hover {
        background: #fff;
        color: #000;
        border-color: #fff;
    }

    /* Iconos sociales simplificados */
    .social-grid {
        display: grid;
        grid-template-columns: 1fr 1fr;
        gap: 10px;
        width: 100%;
        max-width: 320px;
        margin-top: 10px;
    }

    .btn-small {
        padding: 12px;
        font-size: 13px;
    }


/* Footer Estilo Binance Live & Glass */
.b1-footer {
    position: fixed;
    bottom: 0;
    left: 0;
    right: 0;
    background: rgba(11, 14, 17, 0.85); /* Fondo Binance con transparencia */
    backdrop-filter: blur(15px); /* Efecto cristal para que se vea el juego de fondo */
    -webkit-backdrop-filter: blur(15px);
    border-top: 1px solid var(--glass-border); /* Usando tu variable de borde */
    box-shadow: 0 -10px 25px rgba(243, 186, 47, 0.08); /* Resplandor sutil superior */
    z-index: 1001;
    height: 70px;
    padding-bottom: env(safe-area-inset-bottom); /* Soporte para iPhone notch */
}

.footer-container {
    display: flex;
    height: 100%;
    width: 100%;
    align-items: stretch;
}

.footer-item {
    flex: 1;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    text-decoration: none;
    color: var(--muted);
    font-size: 10px;
    font-weight: 700;
    text-transform: uppercase;
    letter-spacing: 1px;
    transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
    position: relative;
    overflow: hidden;
}

/* Efecto de línea de vida activa al presionar */
.footer-item::after {
    content: "";
    position: absolute;
    top: 0;
    left: 50%;
    width: 0;
    height: 2px;
    background: var(--accent);
    transition: all 0.3s ease;
    transform: translateX(-50%);
    box-shadow: 0 0 10px var(--accent);
}

.footer-item:active {
    background: rgba(243, 186, 47, 0.1);
    color: var(--accent);
}

.footer-item:active::after {
    width: 60%;
}

.footer-icon {
    font-size: 18px; /* Tamaño para emojis o iconos */
    margin-bottom: 4px;
    filter: grayscale(1) opacity(0.7);
    transition: all 0.3s ease;
}

.footer-item:active .footer-icon {
    filter: grayscale(0) opacity(1);
    transform: translateY(-2px);
}

.footer-item.active {
    color: var(--accent);
    pointer-events: none;
}
.footer-item.active::after {
    width: 60%;
    background: var(--accent);
    box-shadow: 0 0 10px var(--accent);
}
.footer-item.active .footer-icon {
    filter: grayscale(0) opacity(1);
}


    </style>
</head>
<body>

<!-- GRID DE CONTACTO MONOCROMO -->

</div>

<script>
        document.addEventListener('contextmenu', e => e.preventDefault());
        document.addEventListener('dragstart', e => e.preventDefault());
        document.addEventListener('keydown', e => {

</html>
