<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Preflop Victory | Leo Poker R®</title>
    <!-- Script de Telegram WebApp -->
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        :root {
            --bg: #0b0f14;
            --card: rgba(18, 24, 38, 0.85);
            --accent: #F3BA2F;
            --muted: #8aa0b6;
            --glass-border: rgba(243, 186, 47, 0.2);
            --wsp: #25D366;
        }

        * { 
            margin: 0; 
            padding: 0; 
            box-sizing: border-box;
            -webkit-touch-callout: none !important;
            -webkit-user-select: none !important;
            user-select: none !important;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            background: var(--bg);
            background: radial-gradient(circle at bottom, #164e63 0%, #0b0f14 80%);
            color: #e6eef7;
            font-family: 'Inter', system-ui, sans-serif;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 40px 20px 100px;
            touch-action: manipulation;
            overscroll-behavior: none;
        }

        /* PERFIL  */
        .perfil-container {
            width: 120px;
            height: 120px;
            margin-bottom: 20px;
            border: 3px solid var(--accent);
            border-radius: 50%;
            overflow: hidden;
            box-shadow: 0 0 20px rgba(243, 186, 47, 0.3);
            animation: flotar 3s ease-in-out infinite;
            pointer-events: none; /* Evita menú en la imagen */
        }

        .perfil-container img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            pointer-events: none;
            -webkit-user-drag: none;
        }

        @keyframes flotar {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-8px); }
        }

        /* TEXTOS */
        h2 { color: #fff; font-size: 24px; font-weight: 800; margin-bottom: 10px; }
        h2 span { color: var(--accent); }
        .bio-desc { 
            color: var(--muted); 
            font-size: 14px; 
            text-align: center; 
            max-width: 320px; 
            margin-bottom: 30px; 
        }

        /* BOTONES - Cambiado de <a> a <button> estilizado */
        .bio-boton {
            display: block;
            width: 100%;
            max-width: 320px;
            margin-bottom: 15px;
            padding: 14px 24px;
            border-radius: 4px;
            font-weight: 600;
            font-size: 14px;
            text-align: center;
            text-decoration: none;
            border: none;
            cursor: pointer;
            font-family: inherit;
            transition: all 0.2s cubic-bezier(0.4, 0, 0.2, 1);
            text-transform: none; 
            letter-spacing: 0.3px;
            touch-action: manipulation;
            -webkit-touch-callout: none;
        }

        .btn-basico {
            background: rgba(255, 255, 255, 0.05);
            color: #fff;
            border: 1px solid var(--glass-border);
            backdrop-filter: blur(10px);
        }

        .btn-premium {
            background: var(--accent);
            color: #000;
            border: none;
            box-shadow: 0 0 15px rgba(243, 186, 47, 0.2);
        }

        .btn-wsp {
            background: rgba(37, 211, 102, 0.15);
            color: var(--wsp);
            border: 1px solid var(--wsp);
        }

        .bio-boton:hover {
            transform: scale(1.03);
            filter: brightness(1.1);
        }

        /* GRID DE CONTACTO */
        .social-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 10px;
            width: 100%;
            max-width: 320px;
            margin-top: 10px;
        }

        .btn-small {
            padding: 12px;
            font-size: 13px;
        }

        /* Estilo para los botones de contacto en Blanco y Negro */
        .btn-contacto {
            background: rgba(255, 255, 255, 0.05);
            color: #fff;
            border: 1px solid rgba(255, 255, 255, 0.2);
            backdrop-filter: blur(10px);
        }

        .btn-contacto:hover {
            background: #fff;
            color: #000;
            border-color: #fff;
        }

        /* FOOTER NAV */
        .b1-footer {
            position: fixed;
            bottom: 0;
            left: 0;
            right: 0;
            background: rgba(11, 14, 17, 0.85);
            backdrop-filter: blur(15px);
            -webkit-backdrop-filter: blur(15px);
            border-top: 1px solid var(--glass-border);
            box-shadow: 0 -10px 25px rgba(243, 186, 47, 0.08);
            z-index: 1001;
            height: 70px;
            padding-bottom: env(safe-area-inset-bottom);
        }

        .footer-container {
            display: flex;
            height: 100%;
            width: 100%;
            align-items: stretch;
        }

        .footer-item {
            flex: 1;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            text-decoration: none;
            color: var(--muted);
            font-size: 10px;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 1px;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            position: relative;
            overflow: hidden;
            cursor: pointer;
            border: none;
            background: none;
            font-family: inherit;
            touch-action: manipulation;
            -webkit-touch-callout: none;
        }

        /* Efecto de línea de vida activa al presionar */
        .footer-item::after {
            content: "";
            position: absolute;
            top: 0;
            left: 50%;
            width: 0;
            height: 2px;
            background: var(--accent);
            transition: all 0.3s ease;
            transform: translateX(-50%);
            box-shadow: 0 0 10px var(--accent);
        }

        .footer-item:active {
            background: rgba(243, 186, 47, 0.1);
            color: var(--accent);
        }

        .footer-item:active::after {
            width: 60%;
        }

        .footer-icon {
            font-size: 18px;
            margin-bottom: 4px;
            filter: grayscale(1) opacity(0.7);
            transition: all 0.3s ease;
        }

        .footer-item:active .footer-icon {
            filter: grayscale(0) opacity(1);
            transform: translateY(-2px);
        }

        .footer-item.active {
            color: var(--accent);
            pointer-events: none;
        }
        .footer-item.active::after {
            width: 60%;
            background: var(--accent);
            box-shadow: 0 0 10px var(--accent);
        }
        .footer-item.active .footer-icon {
            filter: grayscale(0) opacity(1);
        }
    </style>
</head>
<body>

    <div class="perfil-container">
        <img src="shark-cap-red.jpg" alt="Leo Poker" draggable="false">
    </div>

    <h2>Entrenador interactivo PLO5</h2>
    <p class="bio-desc">
        Herramientas diseñadas para mejorar decisiones preflop en PLO5.
    </p>

    <!-- BOTONES CAMBIADOS: <a> → <button> con data-url -->
    <button class="bio-boton btn-basico" data-url="demo.html">🎯 Visor Básico Gratis</button>
    <button class="bio-boton btn-premium" data-url="carta.html">🔓 Pack PRO + MRR</button>

    <!-- GRID DE CONTACTO MONOCROMO -->
    <div class="social-grid">
        <button class="bio-boton btn-contacto btn-small" data-url="https://t.me/TuUsuario">✈️ Telegram</button>
        <button class="bio-boton btn-contacto btn-small" data-url="https://discord.gg/TuServidor">🎮 Discord</button>
    </div>
    
    <button class="bio-boton btn-contacto" data-url="https://wa.me/5514981401790" style="width: 100%; max-width: 320px;">💬 WhatsApp</button>

    <!-- FOOTER CAMBIADO: <a> → <button> -->
    <footer class="b1-footer">
        <div class="footer-container">
            <button class="footer-item active" data-url="principal.html" aria-current="page">
                <span class="footer-icon">🏡</span>
                <span>Inicio</span>
            </button>
            <button class="footer-item" data-url="demo.html">
                <span class="footer-icon">🎮</span>
                <span>Entrenar</span>
            </button>
            <button class="footer-item" data-url="cartav.html">
                <span class="footer-icon">📚</span>
                <span>Curso</span>
            </button>
        </div>
    </footer>

    <!-- JAVASCRIPT AL FINAL -->
    <script>
        // === INICIALIZACIÓN TELEGRAM WEBAPP ===
        const tg = window.Telegram.WebApp;
        if (tg) {
            tg.ready();
            tg.expand();
            tg.disableVerticalSwipes();
        }

        // === BLOQUEAR MENÚ CONTEXTUAL AGRESIVAMENTE ===
        document.addEventListener('contextmenu', (e) => {
            e.preventDefault();
            e.stopPropagation();
            return false;
        }, true);

        // Bloquear en imágenes específicamente
        document.querySelectorAll('img').forEach(img => {
            img.addEventListener('contextmenu', (e) => {
                e.preventDefault();
                return false;
            });
        });

        // === MANEJAR CLICS EN BOTONES ===
        document.querySelectorAll('[data-url]').forEach(btn => {
            // Prevenir comportamiento por defecto
            btn.addEventListener('contextmenu', (e) => {
                e.preventDefault();
                return false;
            });

            // Manejar el clic
            btn.addEventListener('click', (e) => {
                e.preventDefault();
                const url = btn.getAttribute('data-url');
                
                // Feedback táctil nativo
                if (tg && tg.HapticFeedback) {
                    tg.HapticFeedback.impactOccurred('light');
                }
                
                // Navegar
                if (url.startsWith('http')) {
                    // Enlaces externos: abrir en navegador
                    if (tg) {
                        tg.openLink(url);
                    } else {
                        window.open(url, '_blank');
                    }
                } else {
                    // Páginas internas: navegación normal
                    window.location.href = url;
                }
            });
        });
    </script>
</body>
</html>
